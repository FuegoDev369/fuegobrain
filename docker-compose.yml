# FuegoBrain — Docker Compose (développement local)
# Usage : docker-compose up
version: '3.9'

services:
  fuegobrain:
    build: .
    container_name: fuegobrain
    ports:
      - "8000:8000"
    env_file:
      - .env          # Copier .env.example → .env et remplir ANTHROPIC_API_KEY
    volumes:
      # Hot-reload en dev : monter le code source
      - ./app:/app/app
      - ./demo:/app/demo
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
