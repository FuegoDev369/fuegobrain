# .github/workflows/ci.yml
# FuegoBrain — CI: validation automatique des tests et du build Docker
# Origine : ajouté suite à VALIDATION-NOTES.md (TICKET-20/21 non confirmés
# par exécution réelle en environnement de développement Termux/Android).
name: CI — Tests & Docker Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── JOB 1 : Tests unitaires ────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pytest
        env:
          # Clé factice — tous les tests sont mockés (DEC-12 du plan),
          # aucun appel Anthropic réel n'est fait en CI.
          ANTHROPIC_API_KEY: ci-test-placeholder
        # NOTE CORRECTION FUEGO-SURGEON (par rapport au TICKET-23 du plan) :
        # `python -m pytest` est utilisé ici au lieu de `pytest` seul.
        # Raison : sans `python -m`, l'interpréteur n'ajoute pas automatiquement
        # la racine du repo à sys.path, et `tests/` ne contient pas de
        # `__init__.py` — pytest insère alors le dossier `tests/` lui-même
        # dans sys.path plutôt que la racine du projet, ce qui casse les
        # imports `from app...` avec `ModuleNotFoundError: No module named 'app'`.
        # Vérifié par exécution réelle dans le sandbox FUEGO-SURGEON (voir
        # VALIDATION-NOTES.md) : `pytest tests/ -v` échoue, `python -m pytest
        # tests/ -v` réussit (12 passed). Comportement identique attendu sur
        # un runner GitHub Actions standard (même mécanisme sys.path).
        run: python -m pytest tests/ -v

  # ── JOB 2 : Build Docker ───────────────────────────────────────────
  docker-build:
    runs-on: ubuntu-latest
    needs: test   # Ne build l'image que si les tests passent (fail-fast)
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t fuegobrain:ci .

      - name: Smoke test — uvicorn boots inside the container
        run: docker run --rm -e ANTHROPIC_API_KEY=ci-test-placeholder fuegobrain:ci uvicorn --version